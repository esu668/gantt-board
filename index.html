<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义甘特图生成器 - 智能看板版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .gantt-grid { display: grid; grid-template-columns: 240px repeat(var(--total-days), minmax(110px, 1fr)); }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        .task-completed-pattern { background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2) 8px, transparent 8px, transparent 16px); opacity: 0.5; }
        .dropdown-menu { transition: opacity 0.15s ease, transform 0.15s ease; transform-origin: top; }
        .spinner { animation: rotate 2s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 10px; cursor: ew-resize; z-index: 15; border-top-right-radius: 0.5rem; border-bottom-right-radius: 0.5rem; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1)); }
        .resize-handle:hover { background: rgba(0,0,0,0.2); }
        .rich-input:empty:before { content: attr(data-placeholder); color: #9ca3af; pointer-events: none; display: block; }
        .rich-input img { max-height: 100px; border-radius: 4px; margin-top: 4px; }
        .rich-input a { color: #3b82f6; text-decoration: underline; }
        
        .gantt-corner { position: sticky; top: 0; z-index: 30; background: white; }
        .gantt-header { position: sticky; top: 0; z-index: 25; }
        @media (min-width: 768px) {
            .gantt-corner { left: 0; }
            .gantt-col-sticky { position: sticky; left: 0; z-index: 22; }
            .gantt-task-sticky { position: sticky; left: 0; z-index: 21; }
        }

        @keyframes soft-breathe {
            0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--log-bg-color, #4f46e5) 50%, transparent); }
            70% { box-shadow: 0 0 0 6px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }
        .breathe-btn { border: none !important; outline: none !important; }
        .breathe-btn.active { animation: soft-breathe 2s infinite cubic-bezier(0.66, 0, 0.34, 1); }
        
        .task-past-mask { background-color: rgba(0, 0, 0, 0.12); border-right: 1.5px dashed rgba(255, 255, 255, 0.7); pointer-events: none; }

        .split-btn-left {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 6%, transparent);
            color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 80%, #4b5563);
            border-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 15%, transparent);
        }
        .split-btn-left:hover {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 12%, transparent);
        }
        .split-btn-right {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 12%, transparent);
            color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 80%, #4b5563);
            border-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 15%, transparent);
        }
        .split-btn-right:hover {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 20%, transparent);
        }
        
        .split-btn-left.active {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 15%, transparent);
            color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 100%, #1e293b);
            border-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 30%, transparent);
        }
        .split-btn-left.active:hover {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 22%, transparent);
        }
        .split-btn-right.active {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 25%, transparent);
            color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 100%, #1e293b);
            border-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 30%, transparent);
        }
        .split-btn-right.active:hover {
            background-color: color-mix(in srgb, var(--log-bg-color, #4f46e5) 35%, transparent);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800 bg-[#f8fafc]">
    <div class="min-h-[56px] bg-white border-b border-gray-200 flex flex-wrap items-center justify-between px-3 md:px-5 py-2 md:py-0 shrink-0 z-50 relative shadow-sm gap-2">
        <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-md shadow-indigo-200 text-white font-bold text-lg shrink-0">G</div>
                <h1 class="font-bold text-gray-800 text-lg tracking-tight flex items-center flex-wrap gap-2">
                    在线协作甘特图 
                    <button onclick="openSettings()" class="text-xs text-indigo-600 font-medium px-2 py-0.5 bg-indigo-50 hover:bg-indigo-100 rounded-md border border-indigo-200 transition-colors flex items-center gap-1 cursor-pointer shrink-0">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        设置
                    </button>
                    <div class="text-[12px] text-gray-400 font-medium flex items-center gap-1.5 hidden shrink-0 ml-1" id="syncStatus"></div>
                </h1>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-1.5 w-full md:w-auto pb-1 md:pb-0">
            <button onclick="switchView('log')" id="btnViewLog" class="breathe-btn px-3.5 py-1.5 text-[13px] font-bold rounded-lg shadow-sm transition-all shrink-0">每日进度</button>
            
            <div class="flex items-stretch shadow-sm rounded-md shrink-0 ml-1 md:ml-3">
                <button id="viewMainBtn" type="button" onclick="switchView(currentDropdownViewMode)" class="split-btn-left flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-l-md border transition-all focus:outline-none border-r-0">
                    <span id="currentViewText">全景看板</span>
                </button>
                <div class="relative custom-dropdown flex">
                    <button id="viewDropdownToggleBtn" type="button" onclick="document.getElementById('viewDropdownMenu').classList.toggle('hidden')" class="split-btn-right flex items-center justify-center px-1.5 py-1.5 text-xs font-bold rounded-r-md border border-l transition-all focus:outline-none">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="viewDropdownMenu" class="absolute left-auto right-0 top-full mt-1 w-28 bg-white border border-gray-200 rounded-lg shadow-lg hidden z-50 py-1.5 origin-top-right">
                        <button type="button" onclick="closeViewDropdown('全景看板', 'gantt')" class="w-full text-left px-4 py-2 text-xs font-bold text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">全景看板</button>
                        <button type="button" onclick="closeViewDropdown('分屏协作', 'split')" class="hidden md:block w-full text-left px-4 py-2 text-xs font-bold text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">分屏协作</button>
                        <button type="button" onclick="closeViewDropdown('专注录入', 'pool')" class="w-full text-left px-4 py-2 text-xs font-bold text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">专注录入</button>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-lg border border-gray-200 shrink-0 ml-1 md:ml-3">
                <button onclick="filterByOwner('all')" id="btnFilterAll" class="px-3 py-1 text-xs font-bold rounded-md bg-white shadow-sm text-gray-800 transition-all">全员视角</button>
                <button onclick="filterByOwner('ESU')" id="btnFilterESU" class="px-3 py-1 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all">ESU</button>
                <button onclick="filterByOwner('MIKO')" id="btnFilterMIKO" class="px-3 py-1 text-xs font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all">MIKO</button>
            </div>

            <button onclick="generateTwoDaySummaryImage()" class="shrink-0 flex items-center gap-1.5 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 border border-emerald-200 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors shadow-sm ml-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="hidden md:inline">2日聚焦图</span>
            </button>
            <button onclick="pullDataFromCloud()" class="shrink-0 flex items-center gap-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span class="hidden md:inline">同步进度</span>
            </button>
        </div>
    </div>
    
    <div id="ganttSection" class="flex-1 flex flex-col p-2 md:p-4 pb-2 min-h-0 transition-all duration-300">
        <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden relative">
            <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-white z-40">
                <h2 class="text-base font-bold flex items-center gap-2 text-gray-800">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    全局排期看板
                </h2>
                <div id="dateRangeDisplay" class="text-[13px] font-medium text-gray-500 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">等待添加任务...</div>
            </div>
            <div class="flex-1 overflow-auto relative bg-gray-50/30 select-none" id="ganttContainer">
                <div id="ganttEmptyState" class="h-full flex flex-col items-center justify-center text-gray-400">
                    <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-sm">请在下方录入任务，甘特图将自动生成并同步</p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="taskSection" class="h-auto md:h-[380px] flex flex-col md:flex-row gap-5 md:gap-4 p-2 md:p-4 pt-2 overflow-hidden shrink-0 transition-all duration-300 hidden">
        <div class="w-full md:w-[420px] bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden shrink-0 flex-1 md:flex-none">
            <div class="px-5 py-3 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center shrink-0">
                <h3 class="font-semibold text-gray-700 text-sm">添加新任务</h3>
            </div>
            <div class="p-5 overflow-y-auto">
                <form id="taskForm" class="flex flex-col gap-3.5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 tracking-wide">具体任务名称</label>
                        <input type="text" id="taskName" required placeholder="例如：设计首页 Banner..." class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm bg-gray-50 focus:bg-white placeholder-gray-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 tracking-wide">任务细节/备注 (选填)</label>
                        <textarea id="taskDetails" rows="2" placeholder="填写具体的细项，如：采购3个不锈钢底座..." class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm bg-gray-50 focus:bg-white placeholder-gray-400 resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3 relative z-40">
                        <div class="relative custom-combobox">
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 tracking-wide">模块大类</label>
                            <div class="relative flex items-center">
                                <input type="text" id="category" required placeholder="选择或输入新大类..." autocomplete="off" class="w-full pl-3 pr-10 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm bg-gray-50 focus:bg-white">
                                <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center justify-center w-6 h-6">
                                    <svg id="categoryArrow" class="w-4 h-4 text-gray-400 pointer-events-none transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    <button type="button" id="categoryClearBtn" onclick="clearInput('category')" class="hidden absolute inset-0 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md" title="清空"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                            </div>
                            <ul id="categoryDropdownList" class="dropdown-menu absolute left-0 right-0 top-[calc(100%+4px)] bg-white border border-gray-200 rounded-xl shadow-lg max-h-40 overflow-y-auto hidden z-50 py-1 opacity-0 scale-y-95"></ul>
                        </div>
                        <div class="flex gap-2">
                            <div class="flex-1 custom-combobox relative">
                                <label class="block text-xs font-bold text-gray-500 mb-1.5 tracking-wide">负责人</label>
                                <div class="relative flex items-center">
                                    <input type="text" id="owner" required placeholder="选择或输入..." autocomplete="off" class="w-full pl-3 pr-10 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm bg-gray-50 focus:bg-white">
                                    <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center justify-center w-6 h-6">
                                        <svg id="ownerArrow" class="w-4 h-4 text-gray-400 pointer-events-none transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        <button type="button" id="ownerClearBtn" onclick="clearInput('owner')" class="hidden absolute inset-0 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md" title="清空"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                    </div>
                                </div>
                                <ul id="ownerDropdownList" class="dropdown-menu absolute left-0 right-0 top-[calc(100%+4px)] bg-white border border-gray-200 rounded-xl shadow-lg max-h-40 overflow-y-auto hidden z-50 py-1 opacity-0 scale-y-95"></ul>
                            </div>
                            <div class="w-[46px] shrink-0">
                                <label class="block text-[11px] font-bold text-gray-500 mb-1.5 text-center">颜色</label>
                                <input type="color" id="taskColor" value="#fde047" class="w-full h-[38px] cursor-pointer bg-white border border-gray-300 p-1 rounded-xl shadow-sm">
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-1 relative z-30">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 tracking-wide">开始</label>
                            <input type="date" id="startDate" required class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm bg-gray-50 focus:bg-white text-gray-700">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1.5 tracking-wide">结束</label>
                            <input type="date" id="endDate" required class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm bg-gray-50 focus:bg-white text-gray-700">
                        </div>
                    </div>
                    <button type="submit" class="mt-2 w-full bg-slate-900 text-white font-medium py-2.5 rounded-xl hover:bg-slate-800 transition-colors shadow-md flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        添加至任务池
                    </button>
                </form>
            </div>
        </div>
        <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden md:max-h-none">
            <div class="px-5 py-3 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center shrink-0">
                <h3 class="font-semibold text-gray-700 text-sm">任务管理池</h3>
                <span class="text-xs bg-white border border-gray-200 px-2.5 py-1 rounded-md text-gray-500 font-medium shadow-sm" id="taskCountBadge">共 0 项</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4" id="taskPoolContainer">
                <div id="poolEmptyState" class="h-full flex flex-col items-center justify-center text-gray-400 text-sm">暂无任务</div>
            </div>
        </div>
    </div>

    <div id="logPageSection" class="flex-1 flex flex-col md:flex-row gap-4 p-2 md:p-4 pb-2 min-h-0 transition-all duration-300 hidden bg-[#f8fafc]">
        <div class="w-full md:w-[420px] bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden shrink-0 flex-1 md:flex-none">
            <div class="px-5 py-3 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center shrink-0">
                <h3 class="font-semibold text-gray-700 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    每日进度汇报
                </h3>
                <div class="flex items-center gap-1.5">
                    <label for="smartLogDateInput" class="text-[11px] font-bold text-gray-500">日期</label>
                    <input type="date" id="smartLogDateInput" class="text-xs font-semibold text-gray-700 bg-white border border-gray-200 rounded-md px-1.5 py-0.5 focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400 cursor-pointer shadow-sm transition-colors" onchange="changeLogDate(this.value)">
                </div>
            </div>
            <div class="p-4 overflow-y-auto flex-1 bg-gray-50/30" id="smartLogContainer">
            </div>
            <div class="p-4 border-t border-gray-100 bg-white shrink-0">
                <button onclick="submitSmartLogs()" class="w-full bg-slate-900 text-white font-medium py-2.5 rounded-xl hover:bg-slate-800 transition-colors shadow-sm text-sm flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    一键生成并记录进度
                </button>
            </div>
        </div>

        <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden flex-1">
            <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-white z-40 shrink-0">
                <h2 class="text-base font-bold flex items-center gap-2 text-gray-800">
