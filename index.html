    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl transition-all duration-300 opacity-0 -translate-y-5 pointer-events-none z-[400] flex items-center gap-2 max-w-[90%]">
        <span id="toastIcon"></span>
        <span id="toastMsg" class="text-sm font-medium"></span>
    </div>
    <script>
        const cloudConfig = {
            binId: '6a5a450df5f4af5e299ceb09',
            apiKey: '$2a$10$yumOXVcT8jdqDb0eObTP1.MXJTmg.44r9Ush3QdJHgsaUh1RZyEwm'
        };
        let ownerColors = { "ESU": "#fde047", "MIKO": "#c084fc", "公共": "#93c5fd" };
        let globalCategories = new Set(['网站与产品', '供应链与物料', '社媒与营销']); 
        let tasks = [];
        let dailyLogs = [];
        let currentOwnerFilter = 'all';
        let defaultLogExpand = false;
        let logBgColor = '#4f46e5'; 
        const initialExtractedData = [];
        
        function getBeijingDateStr() {
            const bjTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"}));
            return `${bjTime.getFullYear()}-${String(bjTime.getMonth() + 1).padStart(2, '0')}-${String(bjTime.getDate()).padStart(2, '0')}`;
        }
        
        const todayStr = getBeijingDateStr();
        
        let currentLogDate = todayStr;
        let currentDropdownViewMode = 'gantt';
        
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;
        document.getElementById('smartLogDateInput').value = todayStr;
        
        let dragInfo = null;
        
        const ganttContainer = document.getElementById('ganttContainer');
        let isDown = false;
        let startX;
        let scrollLeft;

        ganttContainer.addEventListener('mousedown', (e) => {
            if (e.target.closest('.rounded-lg') || e.target.closest('.resize-handle') || e.target.closest('button')) return;
            isDown = true;
            ganttContainer.style.cursor = 'grabbing';
            startX = e.pageX - ganttContainer.offsetLeft;
            scrollLeft = ganttContainer.scrollLeft;
        });

        ganttContainer.addEventListener('mouseleave', () => {
            isDown = false;
            ganttContainer.style.cursor = '';
        });

        ganttContainer.addEventListener('mouseup', () => {
            isDown = false;
            ganttContainer.style.cursor = '';
        });

        ganttContainer.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - ganttContainer.offsetLeft;
            const walk = (x - startX) * 1.5; 
            ganttContainer.scrollLeft = scrollLeft - walk;
        });

        document.addEventListener('click', (e) => {
            if(!e.target.closest('.custom-dropdown')) {
                document.getElementById('viewDropdownMenu')?.classList.add('hidden');
            }
        });

        function getTextColor(hex) {
            const h = hex.replace('#', '');
            if(h.length !== 6) return '#ffffff';
            const r = parseInt(h.substr(0, 2), 16);
            const g = parseInt(h.substr(2, 2), 16);
            const b = parseInt(h.substr(4, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1e293b' : '#ffffff';
        }

        function applyLogBtnStyle() {
            document.documentElement.style.setProperty('--log-bg-color', logBgColor);
            const btn = document.getElementById('btnViewLog');
            btn.style.backgroundColor = logBgColor;
            btn.style.color = getTextColor(logBgColor);
        }

        function openSettings() {
            document.getElementById('setHexESU').value = ownerColors['ESU'] || '#fde047';
            document.getElementById('setColESU').value = ownerColors['ESU'] || '#fde047';
            document.getElementById('setHexMIKO').value = ownerColors['MIKO'] || '#c084fc';
            document.getElementById('setColMIKO').value = ownerColors['MIKO'] || '#c084fc';
            document.getElementById('setHexPub').value = ownerColors['公共'] || '#93c5fd';
            document.getElementById('setColPub').value = ownerColors['公共'] || '#93c5fd';
            document.getElementById('setHexLogBg').value = logBgColor;
            document.getElementById('setColLogBg').value = logBgColor;
            document.getElementById('setLogExpand').checked = defaultLogExpand;
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveSettings() {
            ownerColors['ESU'] = document.getElementById('setColESU').value;
            ownerColors['MIKO'] = document.getElementById('setColMIKO').value;
            ownerColors['公共'] = document.getElementById('setColPub').value;
            logBgColor = document.getElementById('setColLogBg').value;
            defaultLogExpand = document.getElementById('setLogExpand').checked;
            tasks.forEach(t => {
                if(ownerColors[t.owner]) t.color = ownerColors[t.owner];
            });
            applyLogBtnStyle();
            saveData();
            renderApp();
            if(!document.getElementById('logPageSection').classList.contains('hidden')) {
                renderSmartLogForm();
            }
            closeSettings();
            showToast('设置已保存并同步');
        }

        window.filterByOwner = function(owner) {
            currentOwnerFilter = owner;
            const activeClass = ['bg-white', 'shadow-sm', 'text-gray-800'];
            const inactiveClass = ['text-gray-500', 'bg-transparent', 'shadow-none'];
            ['all', 'ESU', 'MIKO'].forEach(id => {
                const btn = document.getElementById('btnFilter' + (id === 'all' ? 'All' : id));
                if (id === owner) {
                    btn.classList.remove(...inactiveClass);
                    btn.classList.add(...activeClass);
                } else {
                    btn.classList.remove(...activeClass);
                    btn.classList.add(...inactiveClass);
                }
            });
            renderApp();
            if(!document.getElementById('logPageSection').classList.contains('hidden')) {
                renderLogs();
                renderSmartLogForm();
            }
        };

        window.changeLogDate = function(val) {
            if (val) {
                currentLogDate = val;
                renderSmartLogForm();
            }
        };

        async function generateTwoDaySummaryImage() {
            showToast('正在排版并生成图片...', 'loading');
            const parts = todayStr.split('-');
            const now = new Date(parts[0], parts[1] - 1, parts[2]);
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = formatDate(tomorrow);
            const dueToday = [];
            const activeToday = [];
            const startingTomorrow = [];
            const displayTasks = currentOwnerFilter === 'all' ? tasks : tasks.filter(t => t.owner === currentOwnerFilter);
            displayTasks.filter(t => !t.completed).forEach(t => {
                if (t.end === todayStr && t.start <= todayStr) {
                    dueToday.push(t);
                } else if (t.start <= todayStr && t.end > todayStr) {
                    activeToday.push(t);
                } else if (t.start === tomorrowStr) {
                    startingTomorrow.push(t);
                }
            });
            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.left = '-9999px';
            wrapper.className = 'w-[540px] bg-white p-5 rounded-2xl shadow-xl font-sans';
            let html = `
                <div class="border-b border-gray-100 pb-3 mb-4 flex justify-between items-end">
                    <div>
                        <h2 class="text-[20px] font-bold text-gray-800 tracking-tight flex items-center gap-2"><span>🎯</span> 近2日聚焦概览</h2>
                        <p class="text-[11px] text-gray-500 mt-1 font-medium">${todayStr} (今日) / ${tomorrowStr} (明日)</p>
                    </div>
                </div>
            `;
            const renderBlock = (title, items, bgColor, borderColor, titleColor, emoji) => {
                if (items.length === 0) return '';
                let blockHtml = `
                    <div class="mb-4 ${bgColor} border ${borderColor} rounded-xl p-3 shadow-sm">
                        <h3 class="text-[13px] font-bold ${titleColor} mb-2.5 flex items-center gap-1.5">${emoji} ${title} <span class="text-gray-600 font-medium text-[10px] ml-1">${items.length}项</span></h3>
                        <div class="flex flex-col gap-2">
                `;
                items.sort((a, b) => a.owner.localeCompare(b.owner) || new Date(a.start) - new Date(b.start)).forEach(t => {
                    let detailsHtml = '';
                    if (t.details && t.details.trim() !== '') {
                        detailsHtml = `<div class="text-[11px] text-gray-500 mt-1.5 bg-gray-50/80 p-1.5 rounded border border-gray-100 whitespace-pre-wrap leading-relaxed">${t.details}</div>`;
                    }
                    blockHtml += `
                        <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-[0_1px_2px_rgba(0,0,0,0.02)] flex justify-between items-start gap-2 overflow-hidden" style="border-left: 4px solid ${t.color};">
                            <div class="flex-1 min-w-0 pl-1">
                                <div class="text-[13px] font-bold text-gray-800 leading-snug">${t.name}</div>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[10px] font-medium text-gray-500">${t.category}</span>
                                    <span class="text-[9px] text-gray-300">|</span>
                                    <span class="text-[10px] text-gray-400 font-medium">${t.start.substring(5)} ~ ${t.end.substring(5)}</span>
                                </div>
                                ${detailsHtml}
                            </div>
                            <div class="text-[11px] font-bold text-gray-500 tracking-wider shrink-0 mt-0.5">
                                ${t.owner}
                            </div>
                        </div>
                    `;
                });
                blockHtml += `</div></div>`;
                return blockHtml;
            };
            html += renderBlock('今日截止', dueToday, 'bg-red-50/40', 'border-red-100', 'text-red-700', '🚨');
            html += renderBlock('今日推进中', activeToday, 'bg-blue-50/40', 'border-blue-100', 'text-blue-700', '⏳');
            html += renderBlock('明日开启', startingTomorrow, 'bg-gray-50/60', 'border-gray-200', 'text-gray-700', '🔜');
            if (dueToday.length === 0 && activeToday.length === 0 && startingTomorrow.length === 0) {
                html += `<div class="text-center py-8 text-gray-400 text-sm bg-gray-50 rounded-xl border border-dashed border-gray-200">这两天没有安排任务哦~ 🎉</div>`;
            }
            html += `
                <div class="mt-3 pt-3 border-t border-gray-100 flex justify-between items-center">
                    <div class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">GENERATED BY GANTT WORKSPACE</div>
                </div>
            `;
            wrapper.innerHTML = html;
            document.body.appendChild(wrapper);
            try {
                const canvas = await html2canvas(wrapper, { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false });
                canvas.toBlob(async (blob) => {
                    try {
                        const item = new ClipboardItem({ 'image/png': blob });
                        await navigator.clipboard.write([item]);
                        hideToast();
                        setTimeout(() => showToast('细节卡片图已复制到剪贴板！'), 300);
                    } catch(e) {
                        hideToast();
                        const dataUrl = canvas.toDataURL("image/png");
                        document.getElementById('generatedImg').src = dataUrl;
                        document.getElementById('imageModal').classList.remove('hidden');
                    } finally {
                        document.body.removeChild(wrapper);
                    }
                });
            } catch (e) {
                hideToast();
                setTimeout(() => showToast('生成图片失败', 'error'), 300);
                document.body.removeChild(wrapper);
            }
        }

        function enforceOwnerColors() {
            tasks.forEach(t => {
                if (t.owner === '公共' || t.owner === '共同') t.owner = '公共'; 
                if (ownerColors[t.owner]) t.color = ownerColors[t.owner];
            });
        }

        async function pullDataFromCloud() {
            const status = document.getElementById('syncStatus');
            status.classList.remove('hidden');
            status.innerHTML = `<span class="w-2 h-2 rounded-full bg-blue-400 spinner"></span> 获取中...`;
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}/latest`, {
                    headers: { 'X-Access-Key': cloudConfig.apiKey }
                });
                const result = await response.json();
                if (result.record) {
                    if (result.record.tasks && result.record.tasks.length > 0) tasks = result.record.tasks;
                    else tasks = initialExtractedData;
                    if (result.record.logs) dailyLogs = result.record.logs;
                } else {
                    tasks = initialExtractedData;
                    pushDataToCloud(); 
                }
                enforceOwnerColors(); 
                tasks.forEach(t => { if(t.category) globalCategories.add(t.category); });
                renderApp();
                renderLogs();
                if(!document.getElementById('logPageSection').classList.contains('hidden')) {
                    renderSmartLogForm();
                }
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_0_2px_rgba(52,211,153,0.2)]"></span> 已同步`;
            } catch (error) {
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400"></span> 拉取失败`;
            }
        }

        async function pushDataToCloud() {
            const status = document.getElementById('syncStatus');
            status.classList.remove('hidden');
            status.innerHTML = `<span class="w-2 h-2 rounded-full bg-blue-400 spinner"></span> 保存中...`;
            try {
                enforceOwnerColors();
                const response = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Access-Key': cloudConfig.apiKey },
                    body: JSON.stringify({ tasks: tasks, logs: dailyLogs })
                });
                if(response.ok) {
                    status.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_0_2px_rgba(52,211,153,0.2)]"></span> 已同步`;
                } else throw new Error("API Error");
            } catch (error) {
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400"></span> 保存失败`;
            }
        }

        function saveData() {
            enforceOwnerColors();
            pushDataToCloud();
        }

        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const taskName = document.getElementById('taskName').value.trim();
            const taskDetails = document.getElementById('taskDetails').value.trim();
            const category = document.getElementById('category').value.trim();
            let owner = document.getElementById('owner').value.trim();
            if (owner === '共同') owner = '公共';
            const color = ownerColors[owner] || document.getElementById('taskColor').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (new Date(start) > new Date(end)) {
                showToast('开始日期不能晚于结束日期！', 'error'); return;
            }
            tasks.push({ id: Date.now().toString(), name: taskName, details: taskDetails, category: category, owner: owner, color: color, start: start, end: end, completed: false });
            globalCategories.add(category);
            if (!ownerColors[owner]) ownerColors[owner] = color;
            renderApp();
            saveData();
            document.getElementById('taskName').value = '';
            document.getElementById('taskDetails').value = '';
            document.getElementById('taskName').focus();
            showToast('任务添加成功');
            if(!document.getElementById('logPageSection').classList.contains('hidden')) renderSmartLogForm();
        });

        function openEditModal(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            document.getElementById('editTaskId').value = task.id;
            document.getElementById('editTaskName').value = task.name;
            document.getElementById('editTaskDetails').value = task.details || '';
            document.getElementById('editCategory').value = task.category;
            document.getElementById('editOwner').value = task.owner;
            document.getElementById('editStartDate').value = task.start;
            document.getElementById('editEndDate').value = task.end;
            document.getElementById('editCompleted').checked = task.completed;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editTaskId').value;
            const task = tasks.find(t => t.id === id);
            if (task) {
                const s = document.getElementById('editStartDate').value;
                const en = document.getElementById('editEndDate').value;
                if (new Date(s) > new Date(en)) {
                    showToast('开始日期不能晚于结束日期', 'error'); return;
                }
                task.name = document.getElementById('editTaskName').value.trim();
                task.details = document.getElementById('editTaskDetails').value.trim();
                task.category = document.getElementById('editCategory').value.trim();
                let owner = document.getElementById('editOwner').value.trim();
                if (owner === '共同') owner = '公共';
                task.owner = owner;
                task.start = s;
                task.end = en;
                task.completed = document.getElementById('editCompleted').checked;
                globalCategories.add(task.category);
                saveData();
                renderApp();
                closeEditModal();
                showToast('修改成功');
                if(!document.getElementById('logPageSection').classList.contains('hidden')) renderSmartLogForm();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!dragInfo) return;
            const deltaX = e.clientX - dragInfo.startX;
            const deltaDays = Math.round(deltaX / dragInfo.cellWidth);
            if (deltaDays !== dragInfo.deltaDays) {
                dragInfo.deltaDays = deltaDays;
                let newWidth = dragInfo.initialWidth + (deltaDays * dragInfo.cellWidth);
                if (newWidth < 20) newWidth = 20;
                dragInfo.element.style.width = `calc(${newWidth}px)`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (!dragInfo) return;
            if (dragInfo.deltaDays !== 0) {
                const task = tasks.find(t => t.id === dragInfo.taskId);
                if (task) {
                    const ed = new Date(task.end);
                    ed.setDate(ed.getDate() + dragInfo.deltaDays);
                    const sd = new Date(task.start);
                    if (ed >= sd) {
                        task.end = ed.toISOString().split('T')[0];
                        saveData();
                        renderApp();
                        showToast('日期已更新');
                        if(!document.getElementById('logPageSection').classList.contains('hidden')) renderSmartLogForm();
                    } else renderApp();
                }
            } else renderApp();
            dragInfo = null;
        });

        window.deleteTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderApp();
            saveData();
            showToast('任务已删除');
            if(!document.getElementById('logPageSection').classList.contains('hidden')) renderSmartLogForm();
        };

        window.toggleComplete = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderApp();
                saveData();
                if(!document.getElementById('logPageSection').classList.contains('hidden')) renderSmartLogForm();
            }
        };

        function renderApp() {
            renderTaskPool();
            renderGantt();
        }

        function renderTaskPool() {
            const pool = document.getElementById('taskPoolContainer');
            const empty = document.getElementById('poolEmptyState');
            const displayTasks = currentOwnerFilter === 'all' ? tasks : tasks.filter(t => t.owner === currentOwnerFilter);
            document.getElementById('taskCountBadge').textContent = `共 ${displayTasks.length} 项`;
            if (displayTasks.length === 0) {
                pool.innerHTML = '';
                pool.appendChild(empty);
                return;
            }
            pool.innerHTML = '';
            const grouped = groupBy(displayTasks, 'category');
            for (const cat in grouped) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'mb-6';
                const header = document.createElement('div');
                header.className = 'text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 pl-1 flex items-center gap-2 border-b border-gray-100 pb-2';
                header.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> ${cat}`;
                groupDiv.appendChild(header);
                grouped[cat].forEach(task => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `group flex items-start gap-3 p-3.5 mb-2.5 rounded-xl border transition-all duration-200 ${task.completed ? 'bg-gray-50/80 border-gray-100 opacity-60 grayscale' : 'bg-white border-gray-200 hover:border-indigo-300 hover:shadow-[0_4px_12px_rgba(0,0,0,0.03)]'}`;
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = task.completed;
                    checkbox.className = "mt-0.5 w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-600 cursor-pointer accent-indigo-600 transition-all";
                    checkbox.onchange = () => toggleComplete(task.id);
                    const info = document.createElement('div');
                    info.className = 'flex-1 min-w-0 cursor-pointer';
                    info.onclick = () => openEditModal(task.id);
                    let detailsHtml = '';
                    if (task.details) {
                        detailsHtml = `<div class="text-[11px] text-gray-400 mt-1.5 line-clamp-1">${task.details.replace(/\n/g, ' ')}</div>`;
                    }
                    info.innerHTML = `
                        <div class="text-[13px] font-semibold truncate ${task.completed ? 'line-through text-gray-400' : 'text-gray-800'}">${task.name}</div>
                        ${detailsHtml}
                        <div class="text-[11px] text-gray-500 flex items-center gap-2.5 mt-2 font-medium">
                            <span class="flex items-center gap-1.5 px-2 py-0.5 rounded-md bg-gray-100 border border-gray-200"><div class="w-2 h-2 rounded-full shadow-sm" style="background-color: ${task.color}"></div> ${task.owner}</span>
                            <span class="flex items-center gap-1"><svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> ${task.start.substring(5)} → ${task.end.substring(5)}</span>
                        </div>
                    `;
                    const delBtn = document.createElement('button');
                    delBtn.className = 'p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100';
                    delBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                    delBtn.onclick = () => deleteTask(task.id);
                    itemDiv.appendChild(checkbox);
                    itemDiv.appendChild(info);
                    itemDiv.appendChild(delBtn);
                    groupDiv.appendChild(itemDiv);
                });
                pool.appendChild(groupDiv);
            }
        }

        function renderGantt() {
            const container = document.getElementById('ganttContainer');
            const emptyState = document.getElementById('ganttEmptyState');
            const dateRangeDisplay = document.getElementById('dateRangeDisplay');
            const displayTasks = currentOwnerFilter === 'all' ? tasks : tasks.filter(t => t.owner === currentOwnerFilter);
            if (displayTasks.length === 0) {
                container.innerHTML = '';
                container.appendChild(emptyState);
                dateRangeDisplay.textContent = '等待添加任务...';
                return;
            }
            let minDate = new Date(displayTasks[0].start);
            let maxDate = new Date(displayTasks[0].end);
            displayTasks.forEach(t => {
                const s = new Date(t.start);
                const e = new Date(t.end);
                if (s < minDate) minDate = s;
                if (e > maxDate) maxDate = e;
            });
            minDate.setDate(minDate.getDate() - 1);
            maxDate.setDate(maxDate.getDate() + 3);
            const totalDays = Math.round((maxDate - minDate) / (1000 * 60 * 60 * 24)) + 1;
            dateRangeDisplay.textContent = `${formatDate(minDate)} 至 ${formatDate(maxDate)}`;
            const groupedTasks = groupBy(displayTasks, 'category');
            const wrapper = document.createElement('div');
            wrapper.style.setProperty('--total-days', totalDays);
            wrapper.className = 'gantt-grid min-w-max pb-4';
            
            const corner = document.createElement('div');
            corner.className = 'gantt-corner p-3 border-b border-r border-gray-200 text-xs font-bold text-gray-500 tracking-wider flex items-end uppercase';
            corner.style.gridColumn = '1';
            corner.textContent = '任务排期 (模块)';
            wrapper.appendChild(corner);

            let currentDay = new Date(minDate);
            for (let i = 0; i < totalDays; i++) {
                const dayHeader = document.createElement('div');
                const currentDateStr = formatDate(currentDay);
                const isWeekend = currentDay.getDay() === 0 || currentDay.getDay() === 6;
                const isToday = currentDateStr === todayStr;
                dayHeader.className = `gantt-header p-2 border-b border-r border-gray-200 text-center text-[12px] flex flex-col justify-end ${isToday ? 'bg-red-50 text-red-600 shadow-[inset_2px_0_6px_rgba(0,0,0,0.05),inset_-2px_0_6px_rgba(0,0,0,0.05)] border-red-200' : (isWeekend ? 'bg-slate-100/70 text-gray-400' : 'bg-white text-gray-500')}`;
                const dText = document.createElement('span');
                dText.className = 'font-semibold';
                dText.textContent = `${currentDay.getMonth() + 1}月${currentDay.getDate()}日`;
                dayHeader.appendChild(dText);
                wrapper.appendChild(dayHeader);
                currentDay.setDate(currentDay.getDate() + 1);
            }
            
            for (const category in groupedTasks) {
                const catRowLabel = document.createElement('div');
                catRowLabel.className = 'gantt-col-sticky p-2 pl-4 border-b border-gray-200 bg-gray-100 flex items-center shadow-[0_1px_0_0_#e5e7eb]';
                catRowLabel.style.gridColumn = '1';
                catRowLabel.innerHTML = `<span class="bg-white border border-gray-200 px-2 py-0.5 rounded shadow-sm text-[13px] font-bold text-gray-700">${category}</span>`;
                wrapper.appendChild(catRowLabel);

                const catRowTrack = document.createElement('div');
                catRowTrack.className = 'border-b border-gray-200 bg-gray-100/50';
                catRowTrack.style.gridColumn = '2 / -1';
                wrapper.appendChild(catRowTrack);

                groupedTasks[category].forEach(task => {
                    const taskLabel = document.createElement('div');
                    taskLabel.className = `gantt-task-sticky p-2.5 pl-6 border-b border-r border-gray-200 flex flex-col justify-center transition-colors ${task.completed ? 'bg-gray-50 opacity-60' : 'bg-white'}`;
                    taskLabel.style.gridColumn = '1';
                    let detailsTooltip = task.details ? `title="${task.details.replace(/"/g, '&quot;')}"` : '';
                    taskLabel.innerHTML = `
                        <div class="text-[13px] truncate w-[220px] ${task.completed ? 'text-gray-400 line-through' : 'text-gray-700'}" ${detailsTooltip}>
                            ${task.name}
                        </div>
                    `;
                    wrapper.appendChild(taskLabel);
                    
                    const tParts = task.start.split('-');
                    const taskStart = new Date(tParts[0], tParts[1] - 1, tParts[2]);
                    const eParts = task.end.split('-');
                    const taskEnd = new Date(eParts[0], eParts[1] - 1, eParts[2]);
                    
                    const startIndex = Math.max(0, Math.round((taskStart - minDate) / (1000 * 60 * 60 * 24)));
                    const duration = Math.round((taskEnd - taskStart) / (1000 * 60 * 60 * 24)) + 1;
                    currentDay = new Date(minDate);
                    
                    let pastPercentage = 0;
                    if (!task.completed) {
                        const parts = todayStr.split('-');
                        const todayD = new Date(parts[0], parts[1] - 1, parts[2]);
                        let pDays = Math.round((todayD - taskStart) / (1000 * 60 * 60 * 24));
                        if (pDays > 0) {
                            if (pDays > duration) pDays = duration;
                            pastPercentage = (pDays / duration) * 100;
                        }
                    }

                    for (let i = 0; i < totalDays; i++) {
                        const cell = document.createElement('div');
                        const currentDateStr = formatDate(currentDay);
                        const isWeekend = currentDay.getDay() === 0 || currentDay.getDay() === 6;
                        const isToday = currentDateStr === todayStr;
                        cell.className = `border-b border-r border-gray-100 relative ${isToday ? 'bg-red-50/50 shadow-[inset_2px_0_6px_rgba(0,0,0,0.05),inset_-2px_0_6px_rgba(0,0,0,0.05)]' : (isWeekend ? 'bg-slate-100/70' : 'bg-white')}`;
                        
                        if (i === startIndex) {
                            const bar = document.createElement('div');
                            const visibleDuration = Math.min(duration, totalDays - startIndex);
                            bar.style.width = `calc(${visibleDuration * 100}% - 8px)`;
                            bar.className = `absolute top-1.5 bottom-1.5 left-1 rounded-lg flex items-center px-2.5 overflow-hidden text-[12px] font-medium whitespace-nowrap transition-all cursor-pointer ${task.completed ? 'task-completed-pattern grayscale' : 'hover:-translate-y-[1px] hover:shadow-md'}`;
                            const textColor = getTextColor(task.color);
                            bar.style.backgroundColor = task.color;
                            bar.style.color = textColor;
                            bar.style.zIndex = '10';
                            bar.onclick = (e) => {
                                if (e.target.closest('button') || e.target.classList.contains('resize-handle')) return;
                                openEditModal(task.id);
                            };
                            const ownerInitial = task.owner.charAt(0).toUpperCase();
                            const displayOwner = duration === 1 ? ownerInitial : task.owner;
                            const ownerPadding = duration === 1 ? 'px-1.5' : 'px-2';
                            
                            bar.innerHTML = `
                                ${pastPercentage > 0 ? `<div class="task-past-mask absolute left-0 top-0 bottom-0" style="width: ${pastPercentage}%"></div>` : ''}
                                <span class="truncate flex-1 relative z-10 ${task.completed ? 'line-through opacity-80' : ''}" title="${task.name}">${task.name}</span>
                                <span class="ml-1.5 ${ownerPadding} py-0.5 bg-white/40 rounded text-[10px] uppercase shrink-0 font-bold relative z-10">${displayOwner}</span>
                                <div class="resize-handle relative z-10"></div>
                            `;
                            const handle = bar.querySelector('.resize-handle');
                            handle.onmousedown = (e) => {
                                e.stopPropagation();
                                dragInfo = { taskId: task.id, startX: e.clientX, initialWidth: bar.offsetWidth, cellWidth: cell.offsetWidth, element: bar, deltaDays: 0 };
                            };
                            cell.appendChild(bar);
                        }
                        wrapper.appendChild(cell);
                        currentDay.setDate(currentDay.getDate() + 1);
                    }
                });
            }
            container.innerHTML = '';
            container.appendChild(wrapper);
        }

        function groupBy(array, property) {
            return array.reduce((acc, obj) => {
                const key = obj[property];
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});
        }

        function formatDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');
            toastMsg.textContent = msg;
            if(type === 'success') {
                toastIcon.innerHTML = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else if(type === 'error') {
                toastIcon.innerHTML = `<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else { 
                toastIcon.innerHTML = `<svg class="w-5 h-5 text-blue-400 spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
            }
            toast.classList.remove('opacity-0', '-translate-y-5', 'hidden');
            toast.classList.add('opacity-100', 'translate-y-0');
            if(type !== 'loading') setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', '-translate-y-5'); }, 2500);
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-100', 'translate-y-0');
            toast.classList.add('opacity-0', '-translate-y-5');
        }

        function toggleClearBtn(inputId) {
            const input = document.getElementById(inputId);
            const arrow = document.getElementById(inputId + 'Arrow');
            const clearBtn = document.getElementById(inputId + 'ClearBtn');
            if (input.value.length > 0) { arrow.classList.add('hidden'); clearBtn.classList.remove('hidden'); } 
            else { arrow.classList.remove('hidden'); clearBtn.classList.add('hidden'); }
        }

        window.clearInput = function(inputId) {
            const input = document.getElementById(inputId);
            input.value = '';
            toggleClearBtn(inputId);
            input.focus();
            if(inputId === 'owner') { document.getElementById('taskColor').value = '#fde047'; }
        };

        function setupCombobox(inputId, dataSetOrObj) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(inputId + 'DropdownList');
            function showList() {
                renderList();
                list.classList.remove('hidden');
                setTimeout(() => { list.classList.remove('opacity-0', 'scale-y-95'); list.classList.add('opacity-100', 'scale-y-100'); }, 10);
            }
            function hideList() {
                list.classList.remove('opacity-100', 'scale-y-100'); list.classList.add('opacity-0', 'scale-y-95');
                setTimeout(() => { list.classList.add('hidden'); }, 150);
            }
            function renderList() {
                list.innerHTML = '';
                let items = dataSetOrObj instanceof Set ? Array.from(dataSetOrObj) : Object.keys(dataSetOrObj);
                const filterText = input.value.toLowerCase();
                const filteredItems = items.filter(item => item.toLowerCase().includes(filterText));
                if (filteredItems.length === 0) {
                    list.innerHTML = `<li class="px-3 py-2 text-sm text-gray-400 italic text-center">按回车添加新选项</li>`;
                    return;
                }
                filteredItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'px-3 py-2 text-sm text-gray-700 hover:bg-indigo-50 cursor-pointer transition-colors';
                    li.textContent = item;
                    li.onmousedown = (e) => { 
                        e.preventDefault(); 
                        input.value = item;
                        toggleClearBtn(inputId);
                        hideList();
                        if(inputId === 'owner' && ownerColors[item]) {
                            document.getElementById('taskColor').value = ownerColors[item];
                        }
                    };
                    list.appendChild(li);
                });
            }
            input.addEventListener('focus', showList);
            input.addEventListener('input', () => { 
                toggleClearBtn(inputId); showList(); 
                if(inputId === 'owner' && ownerColors[input.value.trim()]) { document.getElementById('taskColor').value = ownerColors[input.value.trim()]; }
            });
            input.addEventListener('blur', hideList);
        }
        setupCombobox('category', globalCategories);
        setupCombobox('owner', ownerColors);
        
        window.closeViewDropdown = function(text, mode) {
            document.getElementById('viewDropdownMenu').classList.add('hidden');
            if(text) document.getElementById('currentViewText').textContent = text;
            if(mode) {
                currentDropdownViewMode = mode;
                switchView(mode);
            }
        };

        window.switchView = function(mode) {
            const gantt = document.getElementById('ganttSection');
            const pool = document.getElementById('taskSection');
            const logPage = document.getElementById('logPageSection');
            
            const btnLog = document.getElementById('btnViewLog');
            const viewMainBtn = document.getElementById('viewMainBtn');
            const viewDropdownToggleBtn = document.getElementById('viewDropdownToggleBtn');
            
            gantt.classList.add('hidden');
            pool.classList.add('hidden');
            logPage.classList.add('hidden');
            
            if (mode === 'log') {
                logPage.classList.remove('hidden');
                btnLog.classList.add('active');
                
                viewMainBtn.className = "split-btn-left flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-l-md border transition-all focus:outline-none border-r-0";
                viewDropdownToggleBtn.className = "split-btn-right flex items-center justify-center px-1.5 py-1.5 text-xs font-bold rounded-r-md border border-l transition-all focus:outline-none";
                
                renderLogs();
                renderSmartLogForm();
            } else {
                viewMainBtn.className = "split-btn-left active flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-l-md border transition-all focus:outline-none border-r-0";
                viewDropdownToggleBtn.className = "split-btn-right active flex items-center justify-center px-1.5 py-1.5 text-xs font-bold rounded-r-md border border-l transition-all focus:outline-none";
                
                btnLog.classList.remove('active');

                if (mode === 'gantt') {
                    gantt.classList.remove('hidden');
                } else if (mode === 'split') {
                    gantt.classList.remove('hidden');
                    pool.classList.remove('hidden');
                    pool.classList.add('h-auto', 'md:h-[380px]');
                    pool.classList.remove('flex-1');
                } else if (mode === 'pool') {
                    pool.classList.remove('hidden');
                    pool.classList.remove('h-auto', 'md:h-[380px]');
                    pool.classList.add('flex-1');
                }
            }
        };

        window.renderSmartLogForm = function() {
            const container = document.getElementById('smartLogContainer');
            let html = '';
            const owners = ['ESU', 'MIKO', '公共'];
            const displayTasks = currentOwnerFilter === 'all' ? tasks : tasks.filter(t => t.owner === currentOwnerFilter);
            
            let hasAny = false;
            
            owners.forEach(owner => {
                if (currentOwnerFilter !== 'all' && owner !== currentOwnerFilter) return;
                
                hasAny = true; 
                const ownerTasks = displayTasks.filter(t => t.owner === owner && !t.completed && t.start <= currentLogDate && t.end >= currentLogDate);
                
                const hiddenClass = defaultLogExpand ? '' : 'hidden';
                const rotateClass = defaultLogExpand ? 'rotate-180' : '';
                
                html += `
                <div class="mb-5">
                    <div class="cursor-pointer flex items-center justify-between group bg-white/50 px-2 py-1.5 rounded hover:bg-white transition-colors border border-transparent hover:border-gray-200" onclick="document.getElementById('log-sec-${owner}').classList.toggle('hidden'); document.getElementById('log-icon-${owner}').classList.toggle('rotate-180')">
                        <h4 class="font-bold text-sm flex items-center gap-1.5" style="color: ${ownerColors[owner] || '#6b7280'}">
                            <div class="w-2 h-2 rounded-full" style="background-color: ${ownerColors[owner] || '#6b7280'}"></div>
                            ${owner} 的任务汇报 <span class="text-[10px] text-gray-400 font-medium ml-1 bg-gray-100 px-1.5 rounded">${ownerTasks.length} 项排期</span>
                        </h4>
                        <svg id="log-icon-${owner}" class="w-4 h-4 text-gray-400 transition-transform duration-200 ${rotateClass}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    <div id="log-sec-${owner}" class="flex flex-col gap-3 mt-2.5 ${hiddenClass}">
                `;
                
                ownerTasks.forEach(t => {
                    const isDue = t.end === currentLogDate;
                    const safeDetailsForTitle = t.details ? t.details.replace(/"/g, '&quot;') : '';
                    const safeDetailsForAlert = t.details ? t.details.replace(/'/g, "\\'").replace(/\n/g, '\\n') : '';
                    
                    html += `
                    <div class="bg-white p-3.5 rounded-xl border border-gray-200 shadow-sm" data-owner="${owner}" data-taskid="${t.id}">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <div class="text-[13px] font-bold text-gray-800 leading-snug flex-1 flex items-center gap-1.5">
                                <span>${t.name}</span>
                                ${t.details ? `<button type="button" title="${safeDetailsForTitle}" onclick="alert('【任务备注】\\n${safeDetailsForAlert}')" class="text-indigo-400 hover:text-indigo-600 cursor-help transition-colors outline-none shrink-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>` : ''}
                            </div>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded border ${isDue ? 'bg-red-50 text-red-600 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-100'} shrink-0">${isDue ? '截止' : '推进中'}</span>
                        </div>
                        <div class="flex items-center gap-2 mb-2">
                            <select class="smart-log-status w-24 px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/50 bg-white font-medium text-gray-700 outline-none">
                                <option value="推进中" selected>推进中</option>
                                <option value="已完成">已完成</option>
                                <option value="未完成">未完成</option>
                            </select>
                            <input type="text" class="smart-log-comp flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/50 bg-gray-50 focus:bg-white outline-none" placeholder="填写完成度 (选填)...">
                        </div>
                        <div class="smart-log-rich rich-input w-full px-3 py-2 border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/50 bg-gray-50 focus:bg-white min-h-[60px] overflow-x-hidden outline-none break-all" contenteditable="true" data-placeholder="万能输入框 (支持直接粘贴图片、链接或补充说明)..."></div>
                    </div>`;
                });

                html += `
                    <div class="bg-indigo-50/40 p-3.5 rounded-xl border border-indigo-200 border-dashed shadow-sm mt-1" data-owner="${owner}" data-custom="true">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-700 shrink-0">自由任务</span>
                            <input type="text" class="smart-log-custom-name flex-1 px-2 py-1 border border-indigo-200 rounded text-xs focus:ring-2 focus:ring-indigo-500/50 bg-white placeholder-indigo-300/80 outline-none text-gray-800" placeholder="填写临时/突发任务名称 (若无请留空)...">
                        </div>
                        <div class="flex items-center gap-2 mb-2">
                            <select class="smart-log-status w-24 px-2 py-1.5 border border-indigo-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/50 bg-white font-medium text-gray-700 outline-none">
                                <option value="已完成" selected>已完成</option>
                                <option value="推进中">推进中</option>
                                <option value="未完成">未完成</option>
                            </select>
                            <input type="text" class="smart-log-comp flex-1 px-3 py-1.5 border border-indigo-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/50 bg-white outline-none placeholder-indigo-300/80 text-gray-800" placeholder="填写进度 (选填)...">
                        </div>
                        <div class="smart-log-rich rich-input w-full px-3 py-2 border border-indigo-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500/50 bg-white min-h-[50px] overflow-x-hidden outline-none break-all text-gray-800" contenteditable="true" data-placeholder="补充说明/图片/链接..."></div>
                    </div>
                `;

                html += `</div></div>`;
            });

            if(!hasAny) {
                html = `
                <div class="h-32 flex flex-col items-center justify-center text-gray-400">
                    <svg class="w-8 h-8 mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"></path></svg>
                    <p class="text-xs">当前视角下无相关人员</p>
                </div>
                `;
            }
            container.innerHTML = html;
        };

        window.submitSmartLogs = function() {
            const container = document.getElementById('smartLogContainer');
            const items = container.querySelectorAll('[data-owner]');
            
            let groupedLogs = {};
            let hasContent = false;

            items.forEach(item => {
                const owner = item.getAttribute('data-owner');
                const isCustom = item.getAttribute('data-custom') === 'true';
                
                const statusVal = item.querySelector('.smart-log-status').value;
                const compVal = item.querySelector('.smart-log-comp').value.trim();
                const richHtml = item.querySelector('.smart-log-rich').innerHTML.trim();
                
                if (isCustom) {
                    const customName = item.querySelector('.smart-log-custom-name').value.trim();
                    if (customName !== '') {
                        hasContent = true;
                        if (!groupedLogs[owner]) groupedLogs[owner] = [];
                        let contentStr = `• 【${customName}】 [${statusVal}]`;
                        if (compVal) contentStr += ` 进度: ${compVal}。`;
                        if (richHtml && richHtml !== '<br>') {
                            contentStr += `\n<div class="mt-1 ml-4 p-2 bg-gray-50 border border-gray-100 rounded-md text-xs text-gray-600">${richHtml}</div>`;
                        }
                        groupedLogs[owner].push(contentStr);
                    }
                } else {
                    const taskName = item.querySelector('.text-\\[13px\\] > span').textContent.trim();
                    if (statusVal !== '推进中' || compVal || (richHtml && richHtml !== '<br>')) {
                        hasContent = true;
                        if (!groupedLogs[owner]) groupedLogs[owner] = [];
                        let contentStr = `• 【${taskName}】 [${statusVal}]`;
                        if (compVal) contentStr += ` 进度: ${compVal}。`;
                        if (richHtml && richHtml !== '<br>') {
                            contentStr += `\n<div class="mt-1 ml-4 p-2 bg-gray-50 border border-gray-100 rounded-md text-xs text-gray-600">${richHtml}</div>`;
                        }
                        groupedLogs[owner].push(contentStr);
                        
                        if (statusVal === '已完成') {
                            const taskId = item.getAttribute('data-taskid');
                            const t = tasks.find(x => x.id === taskId);
                            if (t) t.completed = true;
                        }
                    }
                }
            });

            if(!hasContent) {
                showToast('请至少填写一项排期进度，或新增一个自由任务', 'error');
                return;
            }

            for (let owner in groupedLogs) {
                const fullContent = groupedLogs[owner].join('\n\n');
                dailyLogs.push({ id: Date.now().toString() + Math.random().toString(36).substr(2, 5), owner, date: currentLogDate, content: fullContent });
            }

            showToast('进度生成并记录成功！');
            saveData();
            renderLogs();
            renderSmartLogForm(); 
            renderApp();
        };
        
        window.deleteLog = function(id) {
            dailyLogs = dailyLogs.filter(l => l.id !== id);
            saveData();
            renderLogs();
            showToast('记录已删除');
        };
        
        function renderLogs() {
            const container = document.getElementById('logListContainer');
            if (dailyLogs.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-sm">暂无进度流，在左侧一键生成你们的第一条动态吧</p>
                    </div>
                `;
                return;
            }
            
            const displayLogs = currentOwnerFilter === 'all' ? dailyLogs : dailyLogs.filter(l => l.owner === currentOwnerFilter);
            
            if (displayLogs.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <p class="text-sm">当前视角下暂无相关记录</p>
                    </div>
                `;
                return;
            }

            const grouped = groupBy(displayLogs, 'date');
            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));
            let html = '<div class="relative pl-4 border-l-2 border-gray-100 ml-2">';
            
            sortedDates.forEach(date => {
                html += `
                    <div class="mb-8 relative">
                        <div class="absolute -left-[23px] top-1 w-2.5 h-2.5 bg-gray-200 rounded-full border-2 border-white"></div>
                        <div class="text-xs font-bold text-gray-500 mb-3 ml-2 flex items-center gap-2">${date}</div>
                        <div class="flex flex-col gap-3 ml-2">
                `;
                grouped[date].forEach(log => {
                    const color = ownerColors[log.owner] || '#64748b';
                    html += `
                        <div class="bg-white border border-gray-200 p-4 rounded-xl text-sm flex gap-3 relative group transition-all hover:border-indigo-300 hover:shadow-md">
                            <div class="w-1.5 rounded-full shrink-0" style="background-color: ${color}"></div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-[13px] mb-1.5 flex items-center gap-2" style="color: ${color}">
                                    <span>${log.owner}</span>
                                </div>
                                <div class="text-gray-700 leading-relaxed">${log.content.replace(/\n/g, '<br>')}</div>
                            </div>
                            <div class="absolute right-3 top-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button type="button" onclick="deleteLog('${log.id}')" class="text-gray-400 hover:text-red-500 bg-gray-50 rounded p-1.5 shadow-sm border border-gray-200">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        applyLogBtnStyle();
        setTimeout(() => { switchView('gantt'); }, 50);
        pullDataFromCloud();
    </script>
</body>
</html>
